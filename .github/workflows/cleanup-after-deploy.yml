name: Cleanup deployments, Actions history, and Git history

on:
  workflow_run:
    workflows: ['Deploy static content to Pages']
    types: [completed]

permissions:
  actions: write
  deployments: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout main history
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Fold main history into the root commit
        env:
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/*:refs/remotes/origin/*"
          remote_sha="$(git rev-parse refs/remotes/origin/main)"

          other_branches=()
          while IFS= read -r branch; do
            case "$branch" in
              origin/HEAD|origin/main) continue ;;
            esac
            other_branches+=("${branch#origin/}")
          done < <(git for-each-ref --format="%(refname:short)" refs/remotes/origin)

          if [ "${#other_branches[@]}" -gt 0 ]; then
            echo "Other branches exist; skipping history rewrite."
            printf " - %s\n" "${other_branches[@]}"
            exit 0
          fi

          if [ "$remote_sha" != "$DEPLOYED_SHA" ]; then
            echo "origin/main moved after the deployed workflow run; skipping history rewrite."
            echo "deployed: $DEPLOYED_SHA"
            echo "current : $remote_sha"
            exit 0
          fi

          git checkout -B main "$remote_sha"

          commit_count="$(git rev-list --count HEAD)"
          if [ "$commit_count" -le 1 ]; then
            echo "main already has a single commit; skipping history rewrite."
            exit 0
          fi

          root_count="$(git rev-list --max-parents=0 --count HEAD)"
          if [ "$root_count" -ne 1 ]; then
            echo "Expected exactly one root commit, found $root_count; refusing to rewrite history."
            exit 1
          fi

          root_commit="$(git rev-list --max-parents=0 HEAD)"
          message_file="$RUNNER_TEMP/root-commit-message.txt"
          git log --format=%B -n 1 "$root_commit" > "$message_file"

          root_author_name="$(git show -s --format=%an "$root_commit")"
          root_author_email="$(git show -s --format=%ae "$root_commit")"

          git config user.name "$root_author_name"
          git config user.email "$root_author_email"

          new_commit="$(
            GIT_AUTHOR_NAME="$root_author_name" \
            GIT_AUTHOR_EMAIL="$root_author_email" \
            git commit-tree HEAD^{tree} -F "$message_file"
          )"

          echo "Created replacement root commit $new_commit from $commit_count commits."
          git update-ref refs/heads/main "$new_commit"
          git push --force-with-lease=refs/heads/main:"$remote_sha" origin refs/heads/main:refs/heads/main

      - name: Remove deployments and workflow runs
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deploymentEnv = 'github-pages';
            const perPage = 100;

            async function listAllDeployments() {
              const deployments = [];
              for (let page = 1; ; page += 1) {
                const response = await github.request('GET /repos/{owner}/{repo}/deployments', {
                  owner,
                  repo,
                  environment: deploymentEnv,
                  per_page: perPage,
                  page,
                });
                deployments.push(...response.data);
                if (response.data.length < perPage) break;
              }
              return deployments;
            }

            async function listAllWorkflowRuns() {
              const runs = [];
              for (let page = 1; ; page += 1) {
                const response = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                  owner,
                  repo,
                  per_page: perPage,
                  page,
                });
                runs.push(...response.data.workflow_runs);
                if (response.data.workflow_runs.length < perPage) break;
              }
              return runs;
            }

            const retentionDays = 7;
            const cutoff = Date.now() - retentionDays * 24 * 60 * 60 * 1000;

            const deployments = await listAllDeployments();
            for (const deployment of deployments) {
              const createdAt = Date.parse(deployment.created_at);
              if (!Number.isNaN(createdAt) && createdAt >= cutoff) continue;

              try {
                await github.request('POST /repos/{owner}/{repo}/deployments/{deployment_id}/statuses', {
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });
              } catch (error) {
                core.warning(`Failed to set deployment ${deployment.id} inactive: ${error.message}`);
              }

              try {
                await github.request('DELETE /repos/{owner}/{repo}/deployments/{deployment_id}', {
                  owner,
                  repo,
                  deployment_id: deployment.id,
                });
              } catch (error) {
                core.warning(`Failed to delete deployment ${deployment.id}: ${error.message}`);
              }
            }

            const runs = await listAllWorkflowRuns();
            for (const run of runs) {
              if (run.id === context.runId) continue;
              if (run.status !== 'completed') continue;
              const createdAt = Date.parse(run.created_at);
              if (!Number.isNaN(createdAt) && createdAt >= cutoff) continue;

              try {
                await github.request('DELETE /repos/{owner}/{repo}/actions/runs/{run_id}', {
                  owner,
                  repo,
                  run_id: run.id,
                });
              } catch (error) {
                core.warning(`Failed to delete run ${run.id}: ${error.message}`);
              }
            }
